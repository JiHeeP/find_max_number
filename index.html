<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>빅 스텝 매스</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <style>
    .division-border { border-left: 6px solid #1f2937; border-bottom: 6px solid #1f2937; border-bottom-left-radius: 16px; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    .shake-anim { animation: shake 0.2s ease-in-out 0s 2; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 게임 데이터 및 랜덤 생성기 ---
    const BASE_LEVELS = [
      { level: 1, name: "Lv.1 구구단 패턴" },
      { level: 2, name: "Lv.2 10의 배수" },
      { level: 3, name: "Lv.3 배수 관계" },
      { level: 4, name: "Lv.4 심화 믹스" }
    ];

    const getGCD = (a, b) => (b === 0 ? a : getGCD(b, a % b));

    const getCoprimeMultipliers = (min, max) => {
      let m1, m2;
      do {
        m1 = Math.floor(Math.random() * (max - min + 1)) + min;
        m2 = Math.floor(Math.random() * (max - min + 1)) + min;
      } while (m1 === m2 || getGCD(m1, m2) !== 1);
      return [m1, m2];
    };

    const generateProblem = (level, subject) => {
      let gcd, m1, m2, a, b;
      let attempts = 0;

      while (true) {
        attempts++;
        switch (level) {
          case 1:
            gcd = Math.floor(Math.random() * 8) + 2;
            [m1, m2] = getCoprimeMultipliers(2, 9);
            a = gcd * m1; b = gcd * m2;
            break;
          case 2:
            const maxGcdMult = subject === 'lcm' ? 3 : 9;
            gcd = (Math.floor(Math.random() * maxGcdMult) + 1) * 10;
            [m1, m2] = getCoprimeMultipliers(2, 9);
            a = gcd * m1; b = gcd * m2;
            break;
          case 3:
            const baseSize = subject === 'lcm' ? 15 : 20;
            const baseStart = subject === 'lcm' ? 6 : 11;
            a = Math.floor(Math.random() * baseSize) + baseStart;
            b = a * (Math.floor(Math.random() * 4) + 2);
            break;
          case 4:
            const maxAdvGcd = subject === 'lcm' ? 20 : 30;
            do {
              gcd = Math.floor(Math.random() * (maxAdvGcd - 10)) + 11;
            } while (gcd % 10 === 0);
            [m1, m2] = getCoprimeMultipliers(2, subject === 'lcm' ? 5 : 9);
            a = gcd * m1; b = gcd * m2;
            break;
          default:
            a = 24; b = 36;
        }

        if (level === 3 && Math.random() > 0.5) {
          const temp = a; a = b; b = temp;
        }

        const expectedLcm = (a * b) / getGCD(a, b);
        if (subject === 'gcd' || expectedLcm <= 400 || attempts > 50) {
          return [a, b];
        }
      }
    };

    const App = () => {
      const [appState, setAppState] = useState('menu');
      const [subject, setSubject] = useState('gcd');
      const [activeLevels, setActiveLevels] = useState([]);
      const [teacherConfig, setTeacherConfig] = useState({ level: 1, count: 5 });

      const [currentLevelIdx, setCurrentLevelIdx] = useState(0);
      const [currentProblemIdx, setCurrentProblemIdx] = useState(0);
      const [currentPair, setCurrentPair] = useState([0, 0]);
      const [history, setHistory] = useState([]);

      const [playPhase, setPlayPhase] = useState('dividing');

      const [inputs, setInputs] = useState({ div: '', q1: '', q2: '', lcm: '' });
      const [focusedField, setFocusedField] = useState('div');

      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [errorShake, setErrorShake] = useState(false);

      useEffect(() => {
        if (appState === 'playing') loadProblem();
      }, [currentLevelIdx, currentProblemIdx, appState]);

      const startStudentMode = () => {
        const studentCounts = [6, 4, 4, 4];
        setActiveLevels(BASE_LEVELS.map((lvl, index) => ({ ...lvl, count: studentCounts[index] })));
        startGame();
      };

      const startTeacherMode = () => {
        const selectedLevelInfo = BASE_LEVELS.find(l => l.level === teacherConfig.level);
        setActiveLevels([{ ...selectedLevelInfo, count: teacherConfig.count }]);
        startGame();
      };

      const startGame = () => {
        setCurrentLevelIdx(0);
        setCurrentProblemIdx(0);
        setScore(0);
        setAppState('playing');
      };

      const loadProblem = () => {
        const actualLevel = activeLevels[currentLevelIdx].level;
        const pair = generateProblem(actualLevel, subject);
        setCurrentPair([...pair]);
        setHistory([]);
        setInputs({ div: '', q1: '', q2: '', lcm: '' });
        setPlayPhase('dividing');
        setFocusedField('div');
        setFeedback(null);
      };

      const handleKeypadPress = (key) => {
        if (!focusedField || playPhase === 'cleared') return;
        setFeedback(null);

        if (key === 'DEL') {
          setInputs(prev => ({ ...prev, [focusedField]: prev[focusedField].slice(0, -1) }));
        } else if (key === 'ENTER') {
          processSubmit();
        } else {
          if (inputs[focusedField].length < 4) {
            setInputs(prev => ({ ...prev, [focusedField]: prev[focusedField] + key }));
          }
        }
      };

      const processSubmit = () => {
        if (playPhase === 'dividing') {
          const divisor = parseInt(inputs.div, 10);
          if (isNaN(divisor) || divisor <= 1) return showError("1보다 큰 숫자를 입력하세요!");

          const [a, b] = currentPair;
          if (a % divisor === 0 && b % divisor === 0) {
            const nextA = a / divisor;
            const nextB = b / divisor;
            const newHistory = [...history, { divisor, n1: a, n2: b }];

            setHistory(newHistory);
            setCurrentPair([nextA, nextB]);
            setInputs(prev => ({ ...prev, div: '' }));

            if (getGCD(nextA, nextB) === 1) {
              if (subject === 'gcd') {
                setFocusedField(null);
                handleClear(newHistory);
              } else {
                setPlayPhase('quotients');
                setFocusedField('q1');
              }
            }
          } else {
            showError("두 수의 공약수가 아닙니다!");
            setInputs(prev => ({ ...prev, div: '' }));
          }
        }

        else if (playPhase === 'quotients') {
          if (focusedField === 'q1' && inputs.q1 !== '' && inputs.q2 === '') {
            setFocusedField('q2');
            return;
          }

          if (inputs.q1 === '' || inputs.q2 === '') {
            showError("두 몫을 모두 빈칸 없이 입력해주세요!");
            setFocusedField(inputs.q1 === '' ? 'q1' : 'q2');
            return;
          }

          const q1 = parseInt(inputs.q1, 10);
          const q2 = parseInt(inputs.q2, 10);

          if (q1 === currentPair[0] && q2 === currentPair[1]) {
            setPlayPhase('lcm');
            setFocusedField('lcm');
            setFeedback({ text: "좋아요! 이제 L자 모양으로 모두 곱해보세요!", type: "good" });
          } else {
            showError("몫이 틀렸습니다. 다시 계산해보세요!");
            setInputs(prev => ({ ...prev, q1: '', q2: '' }));
            setFocusedField('q1');
          }
        }

        else if (playPhase === 'lcm') {
          const inputVal = parseInt(inputs.lcm, 10);
          const expectedLcm = history.reduce((acc, curr) => acc * curr.divisor, 1) * currentPair[0] * currentPair[1];

          if (inputVal === expectedLcm) {
            setFocusedField(null);
            handleClear(history);
          } else {
            showError("틀렸습니다. 빨간색 숫자들을 모두 곱해보세요!");
            setInputs(prev => ({ ...prev, lcm: '' }));
          }
        }
      };

      const showError = (msg) => {
        setFeedback({ text: msg, type: 'error' });
        setErrorShake(true);
        setTimeout(() => setErrorShake(false), 500);
      };

      const handleClear = (finalHistory) => {
        setPlayPhase('cleared');
        const steps = finalHistory.length;
        let addedScore = steps === 1 ? 1000 : steps === 2 ? 500 : 200;
        let fbText = steps === 1 ? "Perfect! 완벽한 숫자 감각! 🔥" : steps === 2 ? "Great! 아주 효율적입니다! 👏" : "Clear! 안전하게 잘 풀었어요! 👍";

        setScore(prev => prev + addedScore);
        setFeedback({ text: `${fbText} (+${addedScore}점)`, type: steps === 1 ? 'perfect' : 'good' });
      };

      const handleNextProblem = () => {
        let nextProbIdx = currentProblemIdx + 1;
        let nextLevelIdx = currentLevelIdx;

        if (nextProbIdx >= activeLevels[currentLevelIdx].count) {
          nextProbIdx = 0; nextLevelIdx++;
        }

        if (nextLevelIdx >= activeLevels.length) {
          setAppState('game_over');
        } else {
          setCurrentLevelIdx(nextLevelIdx);
          setCurrentProblemIdx(nextProbIdx);
        }
      };

      const fontClass = "font-[Jua]";

      const VirtualInput = ({ field, value, placeholder, className, isError }) => {
        const isFocused = focusedField === field;
        return (
          <div
            onClick={() => playPhase !== 'cleared' && setFocusedField(field)}
            className={`relative cursor-pointer flex justify-center items-center ${className} ${isFocused ? 'border-b-4 border-blue-600 bg-blue-50/50' : 'border-b-4 border-transparent bg-transparent'} ${isError ? 'text-red-500' : ''}`}
          >
            <span className={value ? '' : 'text-gray-300'}>{value || placeholder}</span>
            {isFocused && (
              <span className="absolute right-0 h-4/5 w-[3px] bg-blue-600 animate-pulse ml-1"></span>
            )}
          </div>
        );
      };

      // --- 화면 렌더링 ---
      if (appState === 'menu') {
        return (
          <div className={`min-h-screen bg-[#fdfbf7] flex flex-col items-center justify-center ${fontClass} text-gray-800 p-4`}>
            <h1 className="text-6xl text-blue-600 mb-2">빅 스텝 매스</h1>
            <p className="text-2xl text-gray-500 mb-10">터치 한 번으로 나누는 직관을 키워보세요!</p>

            <div className="bg-white p-6 rounded-3xl shadow-md border-2 border-gray-100 w-full max-w-2xl mb-8">
              <h2 className="text-3xl text-center mb-4 text-gray-700">1. 무엇을 연습할까요?</h2>
              <div className="flex gap-4">
                <button onClick={() => setSubject('gcd')} className={`flex-1 py-4 text-2xl rounded-2xl transition-all border-4 ${subject === 'gcd' ? 'bg-blue-100 border-blue-400 text-blue-700 shadow-inner' : 'bg-gray-50 border-transparent text-gray-400 hover:bg-gray-100'}`}>
                  <div className="mb-1 text-3xl">I</div>최대공약수
                </button>
                <button onClick={() => setSubject('lcm')} className={`flex-1 py-4 text-2xl rounded-2xl transition-all border-4 ${subject === 'lcm' ? 'bg-orange-100 border-orange-400 text-orange-700 shadow-inner' : 'bg-gray-50 border-transparent text-gray-400 hover:bg-gray-100'}`}>
                  <div className="mb-1 text-3xl">L</div>최소공배수
                </button>
              </div>
            </div>

            <div className="w-full max-w-2xl">
              <h2 className="text-3xl text-center mb-4 text-gray-700">2. 어떻게 연습할까요?</h2>
              <div className="flex gap-6">
                <button onClick={startStudentMode} className="flex-1 flex flex-col items-center p-8 bg-white border-4 border-blue-400 rounded-3xl shadow-xl hover:-translate-y-2 transition-transform">
                  <span className="text-5xl mb-4">👦👧</span><span className="text-3xl font-bold text-blue-600">학생 모드</span><span className="text-lg text-gray-500 mt-2">단계별 맞춤 도전</span>
                </button>
                <button onClick={() => setAppState('teacher_setup')} className="flex-1 flex flex-col items-center p-8 bg-white border-4 border-emerald-400 rounded-3xl shadow-xl hover:-translate-y-2 transition-transform">
                  <span className="text-5xl mb-4">👨‍🏫👩‍🏫</span><span className="text-3xl font-bold text-emerald-600">교사 모드</span><span className="text-lg text-gray-500 mt-2">수업 시연용 설정</span>
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (appState === 'teacher_setup') {
        return (
          <div className={`min-h-screen bg-[#fdfbf7] flex flex-col items-center justify-center ${fontClass} text-gray-800 p-4`}>
            <h2 className="text-5xl text-emerald-600 mb-8">교사 모드 설정</h2>
            <div className="bg-white p-10 rounded-3xl shadow-xl border-2 border-gray-200 text-3xl flex flex-col gap-8 w-full max-w-lg">
              <div className="flex justify-between items-center">
                <label>어떤 레벨을 연습할까요?</label>
                <select className="bg-gray-100 p-2 rounded-xl text-2xl border-2 border-gray-300 outline-none" value={teacherConfig.level} onChange={(e) => setTeacherConfig({...teacherConfig, level: parseInt(e.target.value)})}>
                  {BASE_LEVELS.map(l => <option key={l.level} value={l.level}>{l.name}</option>)}
                </select>
              </div>
              <div className="flex justify-between items-center">
                <label>몇 문제를 풀까요?</label>
                <input type="number" min="1" max="50" className="bg-gray-100 p-2 rounded-xl text-2xl border-2 border-gray-300 w-24 text-center outline-none" value={teacherConfig.count} onChange={(e) => setTeacherConfig({...teacherConfig, count: parseInt(e.target.value)})}/>
              </div>
              <div className="flex gap-4 mt-4">
                <button onClick={() => setAppState('menu')} className="flex-1 py-4 bg-gray-300 text-gray-700 rounded-2xl">취소</button>
                <button onClick={startTeacherMode} className="flex-1 py-4 bg-emerald-500 text-white rounded-2xl shadow-[0_4px_0_#10b981] active:translate-y-[4px] active:shadow-none transition-all">시작하기</button>
              </div>
            </div>
          </div>
        );
      }

      if (appState === 'game_over') {
        return (
          <div className={`min-h-screen bg-[#fdfbf7] flex flex-col items-center justify-center ${fontClass} text-gray-800 p-4`}>
            <h1 className="text-6xl text-blue-600 mb-6">모든 단계 클리어! 🎉</h1>
            <p className="text-4xl mb-8">최종 점수: <span className="text-red-500">{score}</span>점</p>
            <button onClick={() => setAppState('menu')} className="px-8 py-4 bg-blue-500 text-white rounded-2xl text-2xl shadow-[0_6px_0_#2563eb] active:translate-y-[6px] active:shadow-none transition-all">처음으로 돌아가기</button>
          </div>
        );
      }

      const currentLevelInfo = activeLevels[currentLevelIdx];
      const gcdResult = history.reduce((acc, curr) => acc * curr.divisor, 1);
      const lcmResult = gcdResult * currentPair[0] * currentPair[1];
      const highlightL = subject === 'lcm' && (playPhase === 'lcm' || playPhase === 'cleared');

      return (
        <div className={`h-screen bg-[#fdfbf7] ${fontClass} text-gray-800 flex flex-col lg:flex-row overflow-hidden`}>
          {/* 왼쪽(위쪽): 게임 보드 영역 */}
          <div className="flex-1 flex flex-col items-center py-6 relative overflow-y-auto">

            {/* 상단 정보바 */}
            <div className="w-full max-w-2xl flex justify-between items-center mb-8 px-6 shrink-0">
              <button onClick={() => setAppState('menu')} className="text-2xl text-gray-400 hover:text-gray-600 mr-4">🏠 메뉴</button>
              <div className="bg-white px-4 py-2 rounded-2xl shadow-sm border-2 border-gray-200 flex-1 text-center mr-4 flex items-center justify-center gap-2">
                <span className={`px-2 py-1 rounded-md text-sm text-white ${subject === 'gcd' ? 'bg-blue-500' : 'bg-orange-500'}`}>{subject === 'gcd' ? '최대공약수' : '최소공배수'}</span>
                <span className="text-xl text-gray-500">{currentLevelInfo.name}</span>
                <span className="text-xl ml-2 text-blue-600">({currentProblemIdx + 1}/{currentLevelInfo.count})</span>
              </div>
              <div className="text-2xl bg-yellow-100 px-4 py-2 rounded-2xl border-2 border-yellow-300 shadow-sm whitespace-nowrap">
                점수: <span className="text-red-500">{score}</span>
              </div>
            </div>

            {/* 칠판/문제 영역 */}
            <div className="flex flex-col items-center text-5xl tracking-widest mt-4 shrink-0">
              {history.map((step, idx) => (
                <div key={idx} className="flex items-end mb-1">
                  <div className="w-20 text-right pr-4 text-red-400 font-bold relative">
                    <div className="absolute inset-0 bg-red-100 -z-10 rounded-lg mx-2 my-1"></div>
                    {step.divisor}
                  </div>
                  <div className="division-border pb-2 pl-6 pr-12 flex gap-12">
                    <div className="w-20 text-center">{step.n1}</div>
                    <div className="w-20 text-center">{step.n2}</div>
                  </div>
                </div>
              ))}

              {playPhase === 'dividing' && (
                <div className={`flex items-end mb-1 ${errorShake ? 'shake-anim' : ''}`}>
                  <VirtualInput field="div" value={inputs.div} placeholder="?" className="w-20 pr-4 h-14 text-right text-4xl text-blue-600 font-bold" />
                  <div className="division-border pb-2 pl-6 pr-12 flex gap-12 text-gray-800">
                    <div className="w-20 text-center">{currentPair[0]}</div>
                    <div className="w-20 text-center">{currentPair[1]}</div>
                  </div>
                </div>
              )}

              {playPhase === 'quotients' && (
                <div className={`flex items-end mb-1 mt-2 ${errorShake ? 'shake-anim' : ''}`}>
                  <div className="w-20 pr-4"></div>
                  <div className="pl-6 pr-12 flex gap-12 text-green-600">
                    <VirtualInput field="q1" value={inputs.q1} placeholder="?" className="w-20 h-14 text-center text-4xl font-bold border-green-400" />
                    <VirtualInput field="q2" value={inputs.q2} placeholder="?" className="w-20 h-14 text-center text-4xl font-bold border-green-400" />
                  </div>
                </div>
              )}

              {(playPhase === 'lcm' || playPhase === 'cleared') && (
                <div className="flex items-end mt-4 relative">
                  <div className="w-20 pr-4"></div>
                  <div className="pl-6 pr-12 flex gap-12 text-gray-800 relative">
                    {highlightL && <div className="absolute inset-0 bg-red-100 -z-10 rounded-lg -mx-2 -my-2"></div>}
                    <div className={`w-20 text-center ${highlightL ? 'text-red-500 font-bold' : ''}`}>{currentPair[0]}</div>
                    <div className={`w-20 text-center ${highlightL ? 'text-red-500 font-bold' : ''}`}>{currentPair[1]}</div>
                  </div>
                </div>
              )}
            </div>

            {playPhase === 'lcm' && (
              <div className={`mt-10 flex items-center bg-white p-6 rounded-3xl shadow-lg border-4 border-orange-200 ${errorShake ? 'shake-anim' : ''}`}>
                <span className="text-3xl text-gray-700 mr-4">최소공배수 = </span>
                <VirtualInput field="lcm" value={inputs.lcm} placeholder="?" className="w-32 h-16 text-center text-5xl font-bold text-orange-600 border-orange-400" />
              </div>
            )}

            {/* 피드백 및 다음버튼 영역 */}
            <div className="mt-8 flex flex-col items-center shrink-0 min-h-[120px]">
              {feedback && (
                <div className={`text-2xl px-6 py-3 rounded-full shadow-lg mb-4 ${
                  feedback.type === 'error' ? 'bg-red-50 text-red-500 border-2 border-red-200' :
                  feedback.type === 'perfect' ? 'bg-gradient-to-r from-yellow-300 via-yellow-200 to-yellow-300 text-yellow-800 animate-bounce' :
                  'bg-green-100 text-green-700 border-2 border-green-300'
                }`}>
                  {feedback.text}
                </div>
              )}
              {playPhase === 'cleared' && (
                <div className="flex flex-col items-center">
                  <div className="text-3xl text-gray-700 bg-white p-4 rounded-3xl shadow-xl border-4 border-gray-100 mb-4">
                    {subject === 'gcd' ? (
                      <>최대공약수: <span className="font-bold tracking-widest mx-2">{history.map(h => h.divisor).join(' × ')} =</span> <span className="bg-[#e4fb73] px-3 py-1 rounded-lg font-bold text-4xl">{gcdResult}</span></>
                    ) : (
                      <>최소공배수: <span className="font-bold tracking-widest mx-2">{[...history.map(h=>h.divisor), currentPair[0], currentPair[1]].join(' × ')} =</span> <span className="bg-[#e4fb73] px-3 py-1 rounded-lg font-bold text-4xl">{lcmResult}</span></>
                    )}
                  </div>
                  <button onClick={handleNextProblem} className="px-8 py-4 bg-gray-800 text-white rounded-full text-2xl shadow-[0_6px_0_#000] active:translate-y-[6px] active:shadow-none transition-all">
                    다음 문제 ➔
                  </button>
                </div>
              )}
            </div>
          </div>

          {/* 오른쪽(아래쪽): 터치용 가상 키패드 영역 */}
          <div className="w-full lg:w-96 bg-gray-100 border-t-4 lg:border-t-0 lg:border-l-4 border-gray-200 p-6 flex flex-col justify-end shrink-0 shadow-[-10px_0_20px_rgba(0,0,0,0.05)] z-10">
            <div className="text-center text-gray-400 mb-4 text-xl">
              {focusedField ? '👇 키패드로 입력하세요' : '대기 중...'}
            </div>
            <div className="grid grid-cols-3 gap-3 h-full max-h-[400px]">
              {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                <button key={num} onClick={() => handleKeypadPress(num.toString())}
                  className="bg-white rounded-2xl text-4xl text-gray-700 font-bold shadow-sm active:bg-gray-200 active:scale-95 transition-all flex items-center justify-center py-4">
                  {num}
                </button>
              ))}
              <button onClick={() => handleKeypadPress('DEL')}
                className="bg-red-50 text-red-500 rounded-2xl text-3xl font-bold shadow-sm active:bg-red-100 active:scale-95 transition-all flex items-center justify-center py-4">
                ⌫
              </button>
              <button onClick={() => handleKeypadPress('0')}
                className="bg-white rounded-2xl text-4xl text-gray-700 font-bold shadow-sm active:bg-gray-200 active:scale-95 transition-all flex items-center justify-center py-4">
                0
              </button>
              <button onClick={() => handleKeypadPress('ENTER')}
                className={`rounded-2xl text-3xl font-bold shadow-sm active:scale-95 transition-all flex items-center justify-center py-4 ${
                  !focusedField ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-blue-500 text-white active:bg-blue-600 shadow-[0_4px_0_#2563eb]'
                }`}>
                입력 ↵
              </button>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
